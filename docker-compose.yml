services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "3002:3002"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3002/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./src
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4173:80"
