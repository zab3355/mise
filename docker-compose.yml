services:
  api:
    image: ghcr.io/zab3355/mise-api:latest
    env_file:
      - ./server/.env
    ports:
      - "3002:3002"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3002/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/zab3355/mise-web:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4173:80"
