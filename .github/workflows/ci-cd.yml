name: CI and Deploy

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Rollup Linux binary
        run: npm i --save-dev @rollup/rollup-linux-x64-gnu

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true

  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Lint backend
        run: npm run lint

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - validate-frontend
      - validate-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Retry ssh-keyscan with backoff for transient DNS failures
          for i in 1 2 3; do
            if ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "SSH host key added successfully"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Retry $i/3: ssh-keyscan failed, waiting before retry..."
              sleep 2
            fi
          done
          echo "Warning: Could not scan host key, disabling strict checking as fallback"
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          exit 0

      - name: Deploy
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -euo pipefail
          cd /home/zabrown/projects/mise
          git pull --ff-only origin main
          docker compose down
          docker compose up -d --build
          docker compose ps
          curl -fsS http://127.0.0.1:4173/ || true
          curl -fsS http://127.0.0.1:3002/health || true
          EOF