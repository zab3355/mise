name: CI and Deploy

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Rollup Linux binary
        run: npm i --save-dev @rollup/rollup-linux-x64-gnu

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true

  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Lint backend
        run: npm run lint

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs:
      - validate-frontend
      - validate-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./src
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/zab3355/mise-web:latest
            ghcr.io/zab3355/mise-web:sha-${{ github.sha }}

      - name: Build and push api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/zab3355/mise-api:latest
            ghcr.io/zab3355/mise-api:sha-${{ github.sha }}